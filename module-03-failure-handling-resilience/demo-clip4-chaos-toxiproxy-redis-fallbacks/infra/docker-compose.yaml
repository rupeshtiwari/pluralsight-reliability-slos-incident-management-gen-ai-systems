services:
  redis:
    image: redis:7.2-alpine
    container_name: clip4-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    restart: unless-stopped

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: clip4-toxiproxy
    ports:
      - "8091:8091"   # model-api proxy
      - "8092:8092"   # vector-db proxy
      - "8474:8474"   # toxiproxy admin API
    volumes:
      - ./toxiproxy/config.json:/config/toxiproxy.json:ro
    command: ["-config", "/config/toxiproxy.json", "-host", "0.0.0.0"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: clip4-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    container_name: clip4-tempo
    ports:
      - "3200:3200"   # tempo HTTP API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
    command: ["-config.file=/etc/tempo.yaml"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: clip4-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_USERS_DEFAULT_THEME=dark
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped
