# Alertmanager config — Alerting and Escalation Demo
#
# Demo timers are shortened for camera visibility:
#   resolve_timeout: 30s  (production: 5m)
#   repeat_interval: 1m   (production: 4h critical, 12h warning)
#   group_wait:      10s  (production: 30s)
#   group_interval:  15s  (production: 5m)

global:
  resolve_timeout: 30s

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 15s
  repeat_interval: 1m
  routes:
    - match:
        severity: critical
      receiver: pagerduty-critical
      repeat_interval: 1m
      continue: false
    - match:
        severity: warning
      receiver: slack-warning
      repeat_interval: 2m
      continue: false

receivers:
  - name: default
    webhook_configs:
      - url: http://host.docker.internal:5001/webhook/default
        send_resolved: true
  - name: pagerduty-critical
    webhook_configs:
      - url: http://host.docker.internal:5001/webhook/pagerduty
        send_resolved: true
  - name: slack-warning
    webhook_configs:
      - url: http://host.docker.internal:5001/webhook/slack
        send_resolved: true

# ── Inhibition ─────────────────────────────────────────────────
# When DependencyDown fires (critical), suppress SLOBurnRateWarning (warning).
# Root cause silences the symptom. Critical burn rate stays — on-call needs it.
inhibit_rules:
  - source_match:
      alertname: DependencyDown
      severity: critical
    target_match:
      alertname: SLOBurnRateWarning
      severity: warning
    equal: []
